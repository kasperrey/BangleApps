<html>
<head>
  <link rel="stylesheet" href="../../css/spectre.min.css">
</head>
<body>
<div id="data"></div>

<script src="../../core/lib/interface.js"></script>
<script>
  var dataElement = document.getElementById("data");
  var csvData = "";

  function getData() {
    dataElement.innerHTML = "";
    Puck.eval(`require("Storage").list(/rungps\\..+\\.csv$/,{sf:1})`,files=>{
      dataElement.innerHTML = "<ul>";
      for (let file of files) {
        dataElement.innerHTML += `<li>${file}</li>`;
        dataElement.innerHTML += `<li><button value="${file}">Download</button><li/>`
      }
      var buttons = dataElement.querySelectorAll("button");
      buttons.forEach((button) => {
        button.addEventListener("click", () => {
          console.log("click");
          selectFile(button.value);
        });
        console.log(button);
      });
      dataElement.innerHTML += "<ul/>";
    });
  }

  function selectFile(fileName) {
    console.log(fileName);
    Util.showModal("Loading...");
    // get the data
    dataElement.innerHTML = "";
    Util.readStorageFile(fileName, data=> {
      csvData = data.trim();
      // remove window
      Util.hideModal();
      // If no data, report it and exit
      if (data.length === 0) {
        dataElement.innerHTML = "<b>No data found</b>";
        return;
      }
      Util.saveCSV("gpsdata", csvData);
      dataElement.innerHTML = "<b>"+fileName+"</b>"
    });
  }

  function onInit() {
    getData();
  }
</script>
</body>
</html>
